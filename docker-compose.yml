version: '3.8'

services:

  mysql:
    image: mysql:8.0
    container_name: officespace_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: Mango10<
      MYSQL_DATABASE: officespace_db
    ports:
      - "3307:3306"
    volumes:
      - ./shared-infra/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-pMango10<"]
      interval: 10s
      timeout: 5s
      retries: 10

  auth-service:
    build: ./auth-service
    container_name: officespace_auth
    restart: unless-stopped
    ports:
      - "8003:8003"
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASS: "Mango10<"
      DB_NAME: officespace_db
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./auth-service:/app/auth-service
      - ./shared-infra:/app/shared-infra

  catalog-service:
    build: ./catalog-service
    container_name: officespace_catalog
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASS: "Mango10<"
      DB_NAME: officespace_db
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./catalog-service:/app/catalog-service
      - ./shared-infra:/app/shared-infra

  booking-service:
    build: ./booking-service
    container_name: officespace_booking
    restart: unless-stopped
    ports:
      - "8002:8002"
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASS: "Mango10<"
      DB_NAME: officespace_db
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./booking-service:/app/booking-service
      - ./shared-infra:/app/shared-infra

  frontend:
    image: php:8.3-apache
    container_name: officespace_frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./frontend:/var/www/html

volumes:
  mysql_data: