# Los secretos se leen del archivo .env (no versionado). Ver .env.example.
# Docker Compose carga automáticamente el .env del directorio del proyecto.

x-service-env: &service-env
  DB_HOST: mysql
  DB_PORT: 3306
  DB_USER: root
  DB_PASS: "${DB_PASS}"
  DB_NAME: "${DB_NAME:-officespace_db}"
  JWT_SECRET: "${JWT_SECRET}"
  JWT_TTL: "${JWT_TTL:-86400}"
  CORS_ORIGINS: "${CORS_ORIGINS:-http://localhost:8080,http://127.0.0.1:8080}"

services:

  mysql:
    image: mysql:8.0
    container_name: officespace_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: "${DB_PASS}"
      MYSQL_DATABASE: "${DB_NAME:-officespace_db}"
    ports:
      - "3307:3306"
    volumes:
      - ./shared-infra/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${DB_PASS}"]
      interval: 10s
      timeout: 5s
      retries: 10

  auth-service:
    build: ./auth-service
    container_name: officespace_auth
    restart: unless-stopped
    ports:
      - "8003:8003"
    environment:
      <<: *service-env
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./auth-service:/app/auth-service
      - ./shared-infra:/app/shared-infra

  catalog-service:
    build: ./catalog-service
    container_name: officespace_catalog
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      <<: *service-env
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./catalog-service:/app/catalog-service
      - ./shared-infra:/app/shared-infra

  booking-service:
    build: ./booking-service
    container_name: officespace_booking
    restart: unless-stopped
    ports:
      - "8002:8002"
    environment:
      <<: *service-env
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./booking-service:/app/booking-service
      - ./shared-infra:/app/shared-infra

  frontend:
    image: php:8.3-apache
    container_name: officespace_frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./frontend:/var/www/html

volumes:
  mysql_data:
